<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mimo-farmer Web UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">▰ mimo-farmer</a>
    <nav class="nav">
      <a href="#/" data-route="/">Dashboard</a>
      <a href="#/create" data-route="/create">Create</a>
      <a href="#/accounts" data-route="/accounts">Accounts</a>
      <a href="#/batches" data-route="/batches">Batches</a>
      <a href="#/settings" data-route="/settings">Settings</a>
    </nav>
    <span id="ws-status" class="badge badge-warning">WS connecting</span>
  </header>

  <main id="app" class="app-shell"></main>

  <template id="dashboard-page">
    <section class="page active">
      <div class="page-head">
        <div>
          <p class="eyebrow">Overview</p>
          <h1>Dashboard</h1>
        </div>
        <div class="actions">
          <a class="btn btn-primary" href="#/create">Create Accounts</a>
          <button class="btn btn-secondary" data-export="json">Export JSON</button>
        </div>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="layout-two">
        <section class="card">
          <div class="card-header"><h2>Recent Activity</h2></div>
          <div id="recent-list" class="activity-list"></div>
        </section>
        <section class="card accent-card">
          <div class="card-header"><h2>Quick Status</h2></div>
          <div id="job-summary" class="job-summary"></div>
        </section>
      </div>
    </section>
  </template>

  <template id="create-page">
    <section class="page active">
      <div class="page-head">
        <div>
          <p class="eyebrow">Pipeline</p>
          <h1>Create Accounts</h1>
        </div>
        <button id="cancel-job" class="btn btn-destructive">Cancel</button>
      </div>
      <div class="create-layout">
        <form id="create-form" class="card form-card">
          <div class="card-header"><h2>Job Config</h2></div>
          <label>Mode
            <select name="mode" class="input">
              <option value="single">Single</option>
              <option value="batch">Batch</option>
              <option value="parallel">Parallel</option>
              <option value="continuous">Continuous</option>
              <option value="siklus">Siklus</option>
            </select>
          </label>
          <label>Referral Code
            <input name="referral" class="input" placeholder="FHAZMU" maxlength="12">
          </label>
          <label>Count
            <input name="count" class="input" type="number" min="1" max="200" value="1">
          </label>
          <label>Parallel Browsers
            <input name="parallel" class="input" type="number" min="1" max="10" value="1">
          </label>
          <label>Password Override
            <input name="password" class="input" type="password" placeholder="blank = config default/randomized">
          </label>
          <label class="check-row">
            <input name="fast" type="checkbox">
            <span>Fast mode</span>
          </label>
          <button class="btn btn-primary" type="submit">Start Job</button>
          <p class="hint">Playwright runs in background thread. Browser stays visible for manual CAPTCHA.</p>
        </form>
        <section class="card terminal-card">
          <div class="card-header split">
            <h2>Live Progress</h2>
            <span id="job-status" class="badge badge-info">idle</span>
          </div>
          <div class="progress">
            <div id="progress-bar" class="progress-bar" style="width: 0%">0%</div>
          </div>
          <div id="step-list" class="step-list"></div>
          <pre id="live-log" class="terminal"></pre>
        </section>
      </div>
    </section>
  </template>

  <template id="accounts-page">
    <section class="page active">
      <div class="page-head">
        <div>
          <p class="eyebrow">Credentials</p>
          <h1>Accounts</h1>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" data-export="csv">Export CSV</button>
          <button class="btn btn-secondary" data-export="txt">Export TXT</button>
        </div>
      </div>
      <section class="card filters">
        <input id="search" class="input" placeholder="Search email/referral">
        <select id="status-filter" class="input">
          <option value="">All status</option>
          <option value="active">Active</option>
          <option value="risk_controlled">Risk controlled</option>
        </select>
        <input id="min-balance" class="input" type="number" step="0.01" placeholder="Min balance">
        <input id="date-from" class="input" type="date">
        <button id="apply-filters" class="btn btn-primary">Apply</button>
      </section>
      <section class="card table-card">
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Email</th><th>Password</th><th>API Key</th><th>Referral</th><th>Balance</th><th>Status</th><th>Created</th><th>Copy</th></tr></thead>
            <tbody id="accounts-body"></tbody>
          </table>
        </div>
        <div id="pagination" class="pagination"></div>
      </section>
    </section>
  </template>

  <template id="batches-page">
    <section class="page active">
      <div class="page-head">
        <div>
          <p class="eyebrow">Files</p>
          <h1>Batches</h1>
        </div>
      </div>
      <section class="card table-card">
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>File</th><th>Mode</th><th>Accounts</th><th>Success</th><th>Fail</th><th>Balance</th><th>Created</th></tr></thead>
            <tbody id="batches-body"></tbody>
          </table>
        </div>
      </section>
    </section>
  </template>

  <template id="settings-page">
    <section class="page active">
      <div class="page-head">
        <div>
          <p class="eyebrow">Config</p>
          <h1>Settings</h1>
        </div>
      </div>
      <form id="settings-form" class="card settings-card">
        <label>Default Referral
          <input name="default_referral" class="input" maxlength="12">
        </label>
        <label>Default Password
          <input name="default_password" class="input" type="password">
        </label>
        <label>IP Rotation Reminder Interval
          <input name="ip_rotation_interval" class="input" type="number" min="1" max="100">
        </label>
        <label>Email Domains (comma separated)
          <input name="email_domains" class="input">
        </label>
        <label class="check-row"><input name="fast_default" type="checkbox"><span>Fast mode default</span></label>
        <label class="check-row"><input name="headless" type="checkbox"><span>Headless browser</span></label>
        <button class="btn btn-primary" type="submit">Save Settings</button>
        <p id="settings-note" class="hint"></p>
      </form>
    </section>
  </template>

  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js"></script>
</body>
</html>
